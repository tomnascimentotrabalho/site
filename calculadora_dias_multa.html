<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pena de Multa</title>
    <style>
        /* --- Variáveis de Tema --- */
        :root {
            --bg-page: #F2F2F2;
            --surface: #FFFFFF;
            --primary: #348E91;
            --secondary: #1C5052;
            --dark-green: #213635;
            --text-main: #0A0C0D;
            --text-muted: #546e7a;
            --text-subtle: #7f8c8d;
            --border-light: #e0e6e6;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-soft: 0 8px 24px rgba(28, 80, 82, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-page); color: var(--text-main); display: flex; justify-content: center; padding: 40px 20px; line-height: 1.5; }
        .container { background-color: var(--surface); max-width: 800px; width: 100%; padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); }

        .header { text-align: center; margin-bottom: 35px; }
        .header-emoji { font-size: 3.5rem; margin-bottom: 10px; display: inline-block; transition: transform 0.2s; }
        .header-emoji:hover { transform: scale(1.1); }
        .header h1 { color: var(--dark-green); font-size: 2rem; font-weight: 800; }
        
        .section-title { font-size: 1.15rem; color: var(--secondary); font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; display: block; width: 4px; height: 20px; background-color: var(--primary); border-radius: 4px; }

        .card { background: #fafcfc; border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 24px; margin-bottom: 24px; }

        .info-panel { background: linear-gradient(135deg, rgba(52, 142, 145, 0.1) 0%, rgba(28, 80, 82, 0.05) 100%); border-left: 4px solid var(--primary); padding: 16px 20px; border-radius: 0 var(--radius-md) var(--radius-md) 0; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; }

        .info-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .info-value { font-size: 1.1rem; color: var(--dark-green); font-weight: 700; }
        
        .fundamento-box { background: #eef5f5; border: 1px solid #cce0e0; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .info-fundamento { font-size: 1.05rem; color: var(--primary); font-weight: 800; }

        label { font-size: 0.95rem; font-weight: 600; color: var(--dark-green); display: block; margin-bottom: 6px; }
        .sub-label { font-size: 0.8rem; color: var(--text-subtle); display: block; margin-bottom: 12px; }

        select, input[type="number"] { width: 100%; padding: 12px 16px; font-size: 1rem; color: var(--text-main); border: 2px solid var(--border-light); border-radius: 8px; outline: none; transition: 0.2s; margin-bottom: 16px; }
        select:focus, input[type="number"]:focus { border-color: var(--primary); }
        select { cursor: pointer; }

        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .time-grid input { margin-bottom: 0; }
        
        .penas-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

        .pena-box { background-color: #EBF4F4; border: 1px solid #B6D2D2; border-radius: var(--radius-md); padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        .pena-box label { color: var(--secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .pena-box .sub-label { color: var(--primary); font-size: 0.8rem; margin-bottom: 12px; display: block; }
        .pena-valor-texto { font-size: 1.5rem; font-weight: 800; color: var(--dark-green); line-height: 1.2; }

        .btn-group { display: flex; gap: 16px; margin-top: 32px; }
        button { flex: 1; padding: 16px 24px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-calc { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: var(--surface); }
        .btn-clear { background-color: transparent; color: var(--text-muted); border: 2px solid var(--border-light); }

        .result-box { display: none; background-color: var(--dark-green); color: var(--surface); padding: 32px; border-radius: var(--radius-lg); margin-top: 40px; }
        .result-box.active { display: block; }
        .result-number { font-size: 4.5rem; font-weight: 800; color: var(--primary); text-align: center; }
        .result-label { font-size: 1.2rem; color: #A0C4C4; text-transform: uppercase; text-align: center; }
        .formula { font-family: monospace; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; color: #87baba; text-align: center; margin-top: 25px; font-size: 0.9rem; }
        .error-msg { display: none; background-color: var(--error-bg); color: var(--error-text); padding: 16px; border-radius: 8px; border-left: 4px solid var(--error-text); margin-bottom: 24px; font-weight: 600; }

        @media (max-width: 600px) {
            .penas-container { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .time-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" style="text-decoration: none;" title="Voltar para a Página Inicial">
            <div class="header-emoji">⚖️</div>
        </a>
        <h1>Calculadora de Multa Penal</h1>
    </div>
    
    <div id="errorBox" class="error-msg"></div>

    <form id="calcForm">
        <div class="card">
            <h2 class="section-title">Infração Penal</h2>
            
            <label for="categoriaCrime">Categoria do Crime</label>
            <select id="categoriaCrime"></select>

            <label for="crimeEspecifico">Crime Específico</label>
            <select id="crimeEspecifico"></select>

            <div class="info-panel">
                <div class="info-row">
                    <span class="info-label">Fundamento Legal</span>
                    <span class="info-fundamento" id="displayFundamento1">Art.</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Limites de Dias-Multa previstos</span>
                    <span class="info-value" id="displayLimites">10 a 360 dias</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">Parâmetros da Pena</h2>
            
            <div class="fundamento-box">
                <span class="info-label">Baseado no Fundamento:</span>
                <span class="info-fundamento" id="displayFundamento2">Art.</span>
            </div>
            
            <div class="penas-container">
                <div class="pena-box">
                    <label>Pena Mínima (P.Mi)</label>
                    <span class="sub-label">Automático pelo tipo penal</span>
                    <div class="pena-valor-texto" id="pMiTexto">0 anos</div>
                </div>

                <div class="pena-box">
                    <label>Pena Máxima (P.Ma)</label>
                    <span class="sub-label">Automático pelo tipo penal</span>
                    <div class="pena-valor-texto" id="pMaTexto">0 anos</div>
                </div>
            </div>

            <label>Pena Aplicada (P.A)</label>
            <span class="sub-label">Insira a Pena Definitiva Fixada pelo Juiz (Concreta)</span>
            <div class="time-grid">
                <input type="number" id="paAnos" min="0" title="Anos" placeholder="Anos">
                <input type="number" id="paMeses" min="0" title="Meses" placeholder="Meses">
                <input type="number" id="paDias" min="0" title="Dias" placeholder="Dias">
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-clear" onclick="window.location.href='index.html'">Voltar</button>
            <button type="button" class="btn-clear" onclick="limpar()">Novo Cálculo</button>
            <button type="button" class="btn-calc" onclick="calcular()">Calcular Multa</button>
        </div>
    </form>

    <div id="resultadoBox" class="result-box">
        <div class="result-number" id="resDiasMulta">0</div>
        <div class="result-label">Dias-Multa</div>
        <div class="formula" id="formulaText"></div>
    </div>
</div>

<script>
    // --- Base de Dados Limpa e Otimizada (Apenas crimes com pena de multa) ---
    const baseDados = {
        patrimonio: {
            label: "💰 Crimes Contra o Patrimônio",
            crimes: [
                { id: "furto_simples", label: "Furto simples", art: "Art. 155", pMin: [1,0,0], pMax: [4,0,0], mMin: 10, mMax: 360 },
                { id: "furto_qualificado", label: "Furto qualificado", art: "Art. 155, §4º", pMin: [2,0,0], pMax: [8,0,0], mMin: 10, mMax: 360 },
                { id: "roubo", label: "Roubo", art: "Art. 157", pMin: [4,0,0], pMax: [10,0,0], mMin: 10, mMax: 360 },
                { id: "latrocinio", label: "Latrocínio", art: "Art. 157, §3º", pMin: [20,0,0], pMax: [30,0,0], mMin: 10, mMax: 360 },
                { id: "extorsao", label: "Extorsão", art: "Art. 158", pMin: [4,0,0], pMax: [10,0,0], mMin: 10, mMax: 360 },
                { id: "extorsao_seq", label: "Extorsão mediante sequestro", art: "Art. 159", pMin: [8,0,0], pMax: [15,0,0], mMin: 10, mMax: 360 },
                { id: "dano_simples", label: "Dano simples", art: "Art. 163", pMin: [0,1,0], pMax: [0,6,0], mMin: 10, mMax: 360 },
                { id: "apropriacao", label: "Apropriação indébita", art: "Art. 168", pMin: [1,0,0], pMax: [4,0,0], mMin: 10, mMax: 360 },
                { id: "estelionato", label: "Estelionato", art: "Art. 171", pMin: [1,0,0], pMax: [5,0,0], mMin: 10, mMax: 360 },
                { id: "receptacao", label: "Receptação", art: "Art. 180", pMin: [1,0,0], pMax: [4,0,0], mMin: 10, mMax: 360 }
            ]
        },
        adm_publica: {
            label: "🏛️ Crimes Contra a Adm. Pública",
            crimes: [
                { id: "peculato", label: "Peculato", art: "Art. 312", pMin: [2,0,0], pMax: [12,0,0], mMin: 10, mMax: 360 },
                { id: "concussao", label: "Concussão", art: "Art. 316", pMin: [2,0,0], pMax: [12,0,0], mMin: 10, mMax: 360 },
                { id: "corrupcao_passiva", label: "Corrupção passiva", art: "Art. 317", pMin: [2,0,0], pMax: [12,0,0], mMin: 10, mMax: 360 },
                { id: "corrupcao_ativa", label: "Corrupção ativa", art: "Art. 333", pMin: [2,0,0], pMax: [12,0,0], mMin: 10, mMax: 360 }
            ]
        },
        pessoa: {
            label: "👤 Crimes Contra a Pessoa",
            crimes: [
                { id: "contagio", label: "Perigo de contágio venéreo", art: "Art. 130", pMin: [0,3,0], pMax: [1,0,0], mMin: 10, mMax: 360 }
            ]
        },
        dignidade_sexual: {
            label: "🛡️ Crimes Contra a Dignidade Sexual",
            crimes: [
                { id: "favorecimento", label: "Favorecimento da prostituição", art: "Art. 228", pMin: [2,0,0], pMax: [5,0,0], mMin: 10, mMax: 360 }
            ]
        },
        especial: {
            label: "📜 Legislação Penal Especial",
            crimes: [
                { id: "trafico", label: "💊 Tráfico de drogas (Lei 11.343)", art: "Art. 33", pMin: [5,0,0], pMax: [15,0,0], mMin: 500, mMax: 1500 },
                { id: "trafico_priv", label: "💊 Tráfico privilegiado", art: "Art. 33, §4º", pMin: [1,8,0], pMax: [5,0,0], mMin: 500, mMax: 1500 },
                { id: "associacao", label: "💊 Associação para tráfico", art: "Art. 35", pMin: [3,0,0], pMax: [10,0,0], mMin: 700, mMax: 1200 },
                { id: "porte_perm", label: "🔫 Porte arma permitida (Lei 10.826)", art: "Art. 14", pMin: [2,0,0], pMax: [4,0,0], mMin: 10, mMax: 360 },
                { id: "posse_ilegal", label: "🔫 Posse arma ilegal", art: "Art. 12", pMin: [1,0,0], pMax: [3,0,0], mMin: 10, mMax: 360 },
                { id: "porte_restr", label: "🔫 Porte arma restrita", art: "Art. 16", pMin: [3,0,0], pMax: [6,0,0], mMin: 10, mMax: 360 },
                { id: "poluicao", label: "🌱 Poluição (Lei 9.605)", art: "Art. 54", pMin: [1,0,0], pMax: [4,0,0], mMin: 10, mMax: 360 },
                { id: "corte_arv", label: "🌱 Corte ilegal de árvores", art: "Art. 39", pMin: [1,0,0], pMax: [3,0,0], mMin: 10, mMax: 360 },
                { id: "maus_tratos", label: "🌱 Maus-tratos a animais", art: "Art. 32", pMin: [2,0,0], pMax: [5,0,0], mMin: 10, mMax: 360 },
                { id: "org_crim", label: "🕵️ Organização Criminosa (Lei 12.850)", art: "Art. 2º", pMin: [3,0,0], pMax: [8,0,0], mMin: 10, mMax: 360 },
                { id: "lavagem", label: "💸 Lavagem de dinheiro (Lei 9.613)", art: "Art. 1º", pMin: [3,0,0], pMax: [10,0,0], mMin: 10, mMax: 360 }
            ]
        }
    };

    const catSelect = document.getElementById('categoriaCrime');
    const crimeSelect = document.getElementById('crimeEspecifico');
    let crimeAtual = null;

    function formataPena(anos, meses, dias) {
        let partes = [];
        if (anos > 0) partes.push(anos + (anos === 1 ? " ano" : " anos"));
        if (meses > 0) partes.push(meses + (meses === 1 ? " mês" : " meses"));
        if (dias > 0) partes.push(dias + (dias === 1 ? " dia" : " dias"));
        return partes.length > 0 ? partes.join(" e ") : "0 dias";
    }

    function converteParaDias(a, m, d) { 
        return (Number(a) * 365) + (Number(m) * 30) + Number(d); 
    }

    function initSelects() {
        for (const cat in baseDados) {
            let option = document.createElement('option');
            option.value = cat;
            option.textContent = baseDados[cat].label;
            catSelect.appendChild(option);
        }

        catSelect.addEventListener('change', atualizarCrimes);
        crimeSelect.addEventListener('change', atualizarDetalhes);

        atualizarCrimes();
    }

    function atualizarCrimes() {
        const categoria = catSelect.value;
        const crimes = baseDados[categoria].crimes;
        
        crimeSelect.innerHTML = '';
        crimes.forEach((c, index) => {
            let option = document.createElement('option');
            option.value = index;
            option.textContent = c.label;
            crimeSelect.appendChild(option);
        });

        atualizarDetalhes();
    }

    function atualizarDetalhes() {
        const categoria = catSelect.value;
        const indexCrime = crimeSelect.value;
        crimeAtual = baseDados[categoria].crimes[indexCrime];

        document.getElementById('displayFundamento1').innerText = crimeAtual.art;
        document.getElementById('displayFundamento2').innerText = crimeAtual.art;
        
        document.getElementById('pMiTexto').innerText = formataPena(...crimeAtual.pMin);
        document.getElementById('pMaTexto').innerText = formataPena(...crimeAtual.pMax);
        
        document.getElementById('displayLimites').innerText = `${crimeAtual.mMin} a ${crimeAtual.mMax} dias`;
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.innerText = msg;
        box.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => { box.style.display = 'none'; }, 6000);
    }

    function calcular() {
        document.getElementById('errorBox').style.display = 'none';
        
        if (!crimeAtual) return;

        const minPenaDias = converteParaDias(...crimeAtual.pMin);
        const maxPenaDias = converteParaDias(...crimeAtual.pMax);
        
        const anos = document.getElementById('paAnos').value || 0;
        const meses = document.getElementById('paMeses').value || 0;
        const dias = document.getElementById('paDias').value || 0;
        
        const paDias = converteParaDias(anos, meses, dias);

        if (paDias < minPenaDias || paDias > maxPenaDias) {
            showError(`A Pena Aplicada informada está incorreta. Para o crime selecionado, ela deve estar entre ${formataPena(...crimeAtual.pMin)} e ${formataPena(...crimeAtual.pMax)}.`);
            return;
        }

        let fracao = 0;
        if (maxPenaDias > minPenaDias) {
            fracao = (paDias - minPenaDias) / (maxPenaDias - minPenaDias);
        }

        const res = Math.round(crimeAtual.mMin + (fracao * (crimeAtual.mMax - crimeAtual.mMin)));
        
        document.getElementById('resDiasMulta').innerText = res;
        document.getElementById('formulaText').innerText = `Proporção do Aumento da Pena: ${(fracao * 100).toFixed(2)}% → Cálculo: ${crimeAtual.mMin} + (${fracao.toFixed(4)} * (${crimeAtual.mMax} - ${crimeAtual.mMin}))`;
        document.getElementById('resultadoBox').classList.add('active');
    }

    function limpar() {
        document.getElementById('calcForm').reset();
        document.getElementById('resultadoBox').classList.remove('active');
        document.getElementById('errorBox').style.display = 'none';
        
        catSelect.selectedIndex = 0;
        atualizarCrimes();
    }

    window.onload = initSelects;
</script>
</body>
</html>
